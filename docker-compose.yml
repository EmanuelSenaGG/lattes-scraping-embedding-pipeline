services:
  # Banco de Dados com suporte a vetores
  postgres:
    image: postgres:17
    container_name: postgres-pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lattes_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    
    # Instala a extensão pgvector na subida do container
    command: >
      sh -c "
        apt-get update &&
        apt-get install -y postgresql-17-pgvector &&
        docker-entrypoint.sh postgres
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lattes_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Pipeline Lattes
  lattes-pipeline:
    build: .
    image: lattes-pipeline
    depends_on:
      postgres:
        condition: service_healthy 
    volumes:
      - ./input:/app/input
      - ./output:/app/output
    environment:
      DB_HOST: postgres
      DB_NAME: lattes_db
      DB_USER: postgres
      DB_PASS: postgres

volumes:
  postgres_data:
    name: lattes_pipeline_postgres_data